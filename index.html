<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福山押仔訂購清單</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #f0f2f5; --success: #27ae60; --hori-bg: #fffbe6; --vert-bg: #e6f7ff; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); margin: 0; padding: 0; overflow-x: hidden; }
        
        .container { max-width: 600px; margin: 0 auto; background: white; min-height: 100vh; padding-bottom: 80px; transition: padding-bottom 0.3s; }
        .container.keyboard-open { padding-bottom: 400px; }

        .header { background: var(--primary); color: white; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
        .header h2 { margin: 0; font-size: 1.6em; }

        .toolbar { 
            background: #ecf0f1; padding: 10px; display: flex; justify-content: space-around; 
            position: sticky; top: 52px; z-index: 95; border-bottom: 2px solid #ddd; 
        }
        .btn-group { display: flex; background: #ddd; padding: 3px; border-radius: 10px; gap: 2px; }
        .icon-btn { 
            padding: 8px 15px; border-radius: 8px; border: none; background: transparent; 
            font-size: 14px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px;
            color: #7f8c8d; transition: all 0.2s;
        }
        .icon-btn.active { background: white; color: var(--primary); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #eee; padding: 8px 5px; font-size: 1em; position: sticky; top: 110px; z-index: 90; border-bottom: 2px solid #ccc; }
        td { padding: 8px 4px; border-bottom: 1px solid #ddd; vertical-align: middle; }
        tr.hidden { display: none; }
        
        tr.horizontal { background-color: var(--hori-bg); }
        tr.vertical { background-color: var(--vert-bg); }

        .prod-info { font-size: 1.4em; font-weight: 900; color: #000; line-height: 1.1; } 
        /* 特規品名顏色 */
        .prod-info.special-item { color: #8e44ad; } 
        
        .spec-info { font-size: 0.95em; color: #444; font-weight: bold; } 
        .price-info { color: #d35400; font-weight: 900; font-size: 1.3em; } 
        
        .qty-box { width: 95%; height: 50px; border: 3px solid #3498db; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: bold; background: #fff; margin: auto; cursor: pointer; } 
        .qty-box.active { background: #fff9c4 !important; border-color: #e74c3c; box-shadow: 0 0 10px rgba(231,76,60,0.4); }
        .subtotal { text-align: right; padding-right: 8px; font-weight: bold; color: var(--primary); font-size: 1.2em; }

        .footer-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #d2d6dc; box-shadow: 0 -3px 15px rgba(0,0,0,0.3); z-index: 1000; transition: transform 0.3s ease-in-out; }
        .footer-panel.collapsed { transform: translateY(285px); } 

        .total-bar { background: var(--primary); color: white; padding: 10px 15px; display: flex; flex-direction: column; cursor: pointer; position: relative; }
        .total-row { display: flex; justify-content: space-between; align-items: center; margin: 2px 0; }
        .total-label { font-size: 1.1em; }
        .total-amount { font-size: 1.7em; color: #f1c40f; font-weight: bold; } 

        .toggle-arrow { position: absolute; right: 15px; top: -15px; background: #d2d6dc; border-radius: 50% 50% 0 0; width: 40px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: #333; box-shadow: 0 -2px 5px rgba(0,0,0,0.1); }

        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; padding: 8px; background: #d2d6dc; height: 270px; }
        .key { background: white; border: none; border-radius: 6px; height: 60px; font-size: 22px; font-weight: bold; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 0 rgba(0,0,0,0.2); cursor: pointer; } 
        .key:active { background: #bdc3c7; transform: translateY(2px); }
        .key.orange { background: #f39c12; color: white; }
        .key.gray { background: #7f8c8d; color: white; }
    </style>
</head>
<body>

<div class="header">
    <h2>🛠 福山押仔訂購清單</h2>
</div>

<div class="toolbar">
    <div class="btn-group">
        <button id="showAllBtn" class="icon-btn active" onclick="setFilter(false)"><span>👁️ 全部</span></button>
        <button id="showSelectedBtn" class="icon-btn" onclick="setFilter(true)"><span>🛒 僅選</span></button>
    </div>
    <div class="btn-group">
        <button id="priceOriginalBtn" class="icon-btn active" onclick="setPriceMode(false)"><span>💵 原價</span></button>
        <button id="priceDiscountBtn" class="icon-btn" onclick="setPriceMode(true)"><span>🤝 經銷</span></button>
    </div>
</div>

<div class="container" id="mainContainer">
    <table id="orderTable">
        <thead>
            <tr>
                <th width="40%">品名/規格</th>
                <th width="18%">單價</th>
                <th width="22%">數量</th>
                <th width="20%">小計</th>
            </tr>
        </thead>
        <tbody id="order-body"></tbody>
    </table>
</div>

<div class="footer-panel" id="footerPanel">
    <div class="toggle-arrow" onclick="toggleKeyboard()">⌨️</div>
    <div class="total-bar" onclick="toggleKeyboard()">
        <div class="total-row">
            <span class="total-label">總計(原價):</span>
            <span class="total-amount">NT$ <span id="grand-total">0</span></span>
        </div>
        <div class="total-row">
            <span id="discount-label" style="color:#aaa; font-size:1em;">經銷價(九折):</span>
            <span class="discount-text" id="discount-display" style="color:#aaa; font-weight:bold; font-size:1.3em;">--</span>
        </div>
    </div>
    <div class="keypad">
        <button class="key" onclick="press(1)">1</button><button class="key" onclick="press(2)">2</button><button class="key" onclick="press(3)">3</button><button class="key gray" onclick="press('back')">←</button>
        <button class="key" onclick="press(4)">4</button><button class="key" onclick="press(5)">5</button><button class="key" onclick="press(6)">6</button><button class="key gray" onclick="press('clear')">清</button>
        <button class="key" onclick="press(7)">7</button><button class="key" onclick="press(8)">8</button><button class="key" onclick="press(9)">9</button><button class="key orange" onclick="press('next')">下</button>
        <button class="key" onclick="press(0)" style="grid-column: span 2;">0</button><button class="key gray" onclick="resetAll()" style="grid-column: span 2; font-size: 16px;">全部重設</button>
    </div>
</div>

<script>
    const products = [
        { name: "4分橫", spec: "65cm", price: 390, type: "h" }, { name: "4分直", spec: "65cm", price: 470, type: "v" },
        { name: "4分橫", spec: "75cm", price: 430, type: "h" }, { name: "4分直", spec: "75cm", price: 530, type: "v" },
        { name: "鋼管4分橫", spec: "65cm", price: 480, type: "h" }, { name: "鋼管4分直", spec: "65cm", price: 580, type: "v" },
        { name: "鋼管4分橫", spec: "75cm", price: 640, type: "h" }, { name: "鋼管4分直", spec: "75cm", price: 680, type: "v" },
        { name: "錏管5分橫◎", spec: "65cm", price: 1080, type: "h", isSpecial: true }, 
        { name: "錏管5分直◎", spec: "65cm", price: 1180, type: "v", isSpecial: true },
        { name: "鋼管5分橫", spec: "65cm", price: 1380, type: "h" }, { name: "鋼管5分直", spec: "65cm", price: 1480, type: "v" },
        { name: "6分橫", spec: "65cm", price: 1780, type: "h" }, { name: "6分直", spec: "65cm", price: 1900, type: "v" },
        { name: "7分橫", spec: "65cm", price: 2300, type: "h" }, { name: "7分直", spec: "65cm", price: 2500, type: "v" },
        { name: "8分橫", spec: "65cm", price: 3400, type: "h" }, { name: "8分直", spec: "65cm", price: 3580, type: "v" },
        { name: "10分橫", spec: "65cm", price: 4800, type: "h" }, { name: "10分直", spec: "65cm", price: 4960, type: "v" },
        { name: "11分橫", spec: "65cm", price: 7500, type: "h" }, { name: "11分直", spec: "65cm", price: 7650, type: "v" }
    ];

    let activeIndex = 0;
    let showOnlySelected = false;
    let isDiscountMode = false;
    let isKeyboardOpen = true;

    function init() {
        const tbody = document.getElementById('order-body');
        tbody.innerHTML = '';
        products.forEach((p, i) => {
            const tr = document.createElement('tr');
            tr.id = 'row-' + i;
            tr.className = p.type === "h" ? "horizontal" : "vertical";
            
            var nameClass = p.isSpecial ? "prod-info special-item" : "prod-info";
            // 規格只留數值，不顯示文字
            var specValue = p.spec;

            var rowContent = '<td>' +
                             '<div class="' + nameClass + '">' + p.name + '</div>' + 
                             '<div class="spec-info">' + specValue + '</div>' +
                             '</td>' +
                             '<td class="price-info">' + p.price + '</td>' +
                             '<td><div class="qty-box" id="qty-' + i + '" onclick="setActive(' + i + ')"></div></td>' +
                             '<td class="subtotal" id="sub-' + i + '">0</td>';
            tr.innerHTML = rowContent;
            tbody.appendChild(tr);
        });
        setActive(0);
    }

    function setActive(index) {
        document.querySelectorAll('.qty-box').forEach(b => b.classList.remove('active'));
        activeIndex = index;
        document.getElementById('qty-' + index).classList.add('active');
        if (!isKeyboardOpen) toggleKeyboard();
    }

    function toggleKeyboard() {
        const panel = document.getElementById('footerPanel');
        const container = document.getElementById('mainContainer');
        isKeyboardOpen = !isKeyboardOpen;
        if (isKeyboardOpen) {
            panel.classList.remove('collapsed');
            container.classList.add('keyboard-open');
        } else {
            panel.classList.add('collapsed');
            container.classList.remove('keyboard-open');
        }
    }

    function setFilter(onlySelected) {
        showOnlySelected = onlySelected;
        document.getElementById('showAllBtn').classList.toggle('active', !onlySelected);
        document.getElementById('showSelectedBtn').classList.toggle('active', onlySelected);
        refreshDisplay();
    }

    function setPriceMode(discount) {
        isDiscountMode = discount;
        document.getElementById('priceOriginalBtn').classList.toggle('active', !discount);
        document.getElementById('priceDiscountBtn').classList.toggle('active', discount);
        const dLabel = document.getElementById('discount-label');
        const dDisp = document.getElementById('discount-display');
        dLabel.style.color = discount ? "#2ecc71" : "#aaa";
        dDisp.style.color = discount ? "#f1c40f" : "#aaa";
        calculate();
    }

    function refreshDisplay() {
        products.forEach((_, i) => {
            const row = document.getElementById('row-' + i);
            const qtyStr = document.getElementById('qty-' + i).innerText;
            const qty = parseInt(qtyStr) || 0;
            row.classList.toggle('hidden', showOnlySelected && qty === 0);
        });
    }

    function press(key) {
        const box = document.getElementById('qty-' + activeIndex);
        if (typeof key === 'number') {
            box.innerText += key;
        } else if (key === 'back') {
            box.innerText = box.innerText.slice(0, -1);
        } else if (key === 'clear') {
            box.innerText = "";
        } else if (key === 'next') {
            if (activeIndex < products.length - 1) {
                setActive(activeIndex + 1);
                document.getElementById('row-' + activeIndex).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }
        calculate();
    }

    function calculate() {
        let rawTotal = 0;
        products.forEach((p, i) => {
            const qtyStr = document.getElementById('qty-' + i).innerText;
            const qty = parseInt(qtyStr) || 0;
            const sub = qty * p.price;
            document.getElementById('sub-' + i).innerText = sub.toLocaleString();
            rawTotal += sub;
        });
        document.getElementById('grand-total').innerText = rawTotal.toLocaleString();
        const discountTotal = Math.round(rawTotal * 0.9);
        document.getElementById('discount-display').innerText = isDiscountMode ? "NT$ " + discountTotal.toLocaleString() : "--";
        refreshDisplay();
    }

    function resetAll() {
        if(confirm("確定要全部重設嗎？")) {
            products.forEach((_, i) => document.getElementById('qty-' + i).innerText = "");
            calculate();
            setActive(0);
        }
    }
    window.onload = init;
</script>
</body>
</html>
