<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>福山押仔訂購系統</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { 
            --primary: #2c3e50; --bg: #f8f9fa; 
            --header-h: 88px; --toolbar-h: 64px; 
            --hori-bg: #fffbe6; --vert-bg: #e6f7ff;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: "PingFang TC", "Heiti TC", "Microsoft JhengHei", sans-serif; 
            background: var(--bg); margin: 0; padding: 0; 
            height: 100vh; width: 100vw; display: flex; flex-direction: column; overflow: hidden;
        }

        #entry-alert {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: white; padding: 25px; text-align: center;
        }
        .alert-card { background: white; color: #333; padding: 30px; border-radius: 20px; max-width: 400px; width: 95%; }
        .alert-card h2 { margin-top: 0; color: var(--primary); font-size: 24px; font-weight: 900; }
        .alert-content { text-align: left; background: #e7f3ff; padding: 20px; border-radius: 12px; margin: 20px 0; line-height: 1.8; border: 2px solid #bde0ff; font-size: 16px; }
        .enter-btn { width: 100%; padding: 16px; background: var(--primary); color: white; border: none; border-radius: 12px; font-size: 1.2em; font-weight: 900; cursor: pointer; }

        .fixed-top { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: #fff; border-bottom: 1px solid #dee2e6; }
        .browser-tip {
            background: #fff3cd; text-align: center; padding: 6px 0;
            font-size: 15px; font-weight: 900; border-bottom: 1px solid #ffeeba;
            animation: flash-text 1s infinite alternate;
        }
        @keyframes flash-text {
            0% { color: #ff0000; }
            100% { color: #0000ff; }
        }

        .header { background: var(--primary); color: white; text-align: center; height: 52px; display: flex; align-items: center; justify-content: center; gap: 12px; }
        .header img { height: 38px; border-radius: 4px; }
        .header h2 { margin: 0; font-size: 1.4em; font-weight: 900; }
        
        .toolbar { background: #ecf0f1; padding: 10px 12px; display: flex; justify-content: space-around; height: var(--toolbar-h); align-items: center; }
        .btn-group { display: flex; background: #ccc; padding: 4px; border-radius: 12px; gap: 4px; }
        .icon-btn { padding: 8px 16px; border-radius: 10px; border: 2.5px solid transparent; background: transparent; font-size: 14px; font-weight: 900; cursor: pointer; color: #555; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .icon-btn.active { background: white; color: var(--primary); border-color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .scroll-container { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; padding-top: calc(var(--header-h) + var(--toolbar-h)); padding-bottom: 450px; background: white; }
        .scroll-container::-webkit-scrollbar { display: none !important; }
        
        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th { background: #f8f9fa; padding: 14px 4px; font-size: 14px; font-weight: 900; position: sticky; top: 0; z-index: 90; border-bottom: 2px solid #000; }
        td { padding: 16px 6px; border-bottom: 1px solid #ddd; vertical-align: middle; }
        
        tr.row-h { background-color: var(--hori-bg) !important; }
        tr.row-v { background-color: var(--vert-bg) !important; }
        tr.filtered-out { display: none !important; }

        .prod-info { font-size: 2.0em; font-weight: 900; color: #000; line-height: 1.1; } 
        .prod-info.special-item { color: #8e44ad !important; }
        .spec-info { font-size: 1.2em; color: #333; font-weight: 900; } 
        .qty-box { width: 95%; height: 60px; border: 3px solid #dee2e6; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 900; background: #fff; margin: auto; } 
        .qty-box.active { border-color: #e74c3c; background: #fff9c4 !important; }
        .subtotal { text-align: right; padding-right: 10px; font-weight: 900; color: var(--primary); font-size: 1.5em; }

        .footer-panel { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1100; background: #d2d6dc; transition: transform 0.3s; }
        .footer-panel.collapsed { transform: translateY(300px); } 
        
        .total-bar { background: var(--primary); color: white; padding: 14px 20px; cursor: pointer; display: flex; flex-direction: column; gap: 4px; }
        .total-row { display: flex; justify-content: flex-end; align-items: center; width: 100%; gap: 10px; }
        .total-val { font-size: 1.8em; color: #f1c40f; font-weight: 900; }
        
        .keypad { display: grid; grid-template-columns: repeat(4, 1fr); gap: 7px; padding: 10px; height: 275px; }
        .key { background: white; border: none; border-radius: 8px; height: 60px; font-size: 28px; font-weight: 900; box-shadow: 0 3px 0 #bbb; }
        .key.orange { background: #f39c12; color: white; }
        .key.send { background: #27ae60; color: white; }
        .key.gray { background: #7f8c8d; color: white; }
        .key.info { background: #ecf0f1; color: var(--primary); font-size: 22px; border-radius: 50%; height: 50px; width: 50px; margin: auto; }

        /* 資訊框樣式 */
        #info-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); z-index: 5000;
            justify-content: center; align-items: center;
        }
        .info-card { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 300px; width: 80%; border: 3px solid var(--primary); }

        #capture-area { position: absolute; left: -9999px; width: 700px; background: white; padding: 50px; }
        .order-title { font-size: 46px; font-weight: 900; border-bottom: 6px solid #000; padding-bottom: 20px; text-align: center; }
        .order-table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        .order-table th { border-bottom: 4px solid #000; padding: 15px 5px; font-size: 26px; font-weight: 900; text-align: right; }
        .order-table th:first-child { text-align: left; }
        .order-table td { border-bottom: 1px solid #ddd; font-size: 28px; font-weight: 800; padding: 25px 5px; text-align: right; }
        .order-table td:first-child { text-align: left; }
        
        .sum-box { margin-top: 40px; border-top: 5px solid #000; padding-top: 25px; text-align: right; }
        .sum-line { font-size: 32px; font-weight: 800; color: #666; margin-bottom: 10px; }
        .sum-final { font-size: 48px; font-weight: 900; color: #c0392b; }
        
        .qr-section { margin-top: 40px; text-align: center; border-top: 2px dashed #ccc; padding-top: 30px; }
        .qr-img-fix { width: 20%; margin: 0 auto; display: block; }

        #result-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; }
        #res-img { max-width: 90%; max-height: 70%; border: 4px solid white; border-radius: 8px; }
        .action-bar { width: 92%; display: flex; justify-content: space-around; margin-top: 25px; gap: 12px; }
        .action-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 15px 5px; border-radius: 16px; color: white; cursor: pointer; text-decoration: none; }
        .action-btn i { font-size: 32px; margin-bottom: 8px; }
        .action-btn span { font-size: 15px; font-weight: 900; }
        .btn-save { background: #3498db; }
        .btn-line { background: #06c755; }
        .btn-back { background: #e74c3c; }
    </style>
</head>

<div id="entry-alert">
    <div class="alert-card">
        <i class="fas fa-info-circle fa-4x" style="color:var(--primary); margin-bottom:20px;"></i>
        <h2>系統使用說明</h2>
        <p style="font-size:16px; color:#555;">為確保功能正常運行，請依照以下說明開啟指定瀏覽器：</p>

        <button class="enter-btn" onclick="document.getElementById('entry-alert').style.display='none'">我知道了，進入系統</button>

</div>

    </div>
</div>

<script>
const products = [{'name': '4分橫', 'spec': '65cm', 'price': 390, 'type': 'h'}, {'name': '4分直', 'spec': '65cm', 'price': 470, 'type': 'v'}, {'name': '4分橫', 'spec': '75cm', 'price': 430, 'type': 'h'}, {'name': '4分直', 'spec': '75cm', 'price': 530, 'type': 'v'}, {'name': '鋼管4分橫', 'spec': '65cm', 'price': 480, 'type': 'h'}, {'name': '鋼管4分直', 'spec': '65cm', 'price': 580, 'type': 'v'}, {'name': '鋼管4分橫', 'spec': '75cm', 'price': 640, 'type': 'h'}, {'name': '鋼管4分直', 'spec': '75cm', 'price': 680, 'type': 'v'}, {'name': '錏管5分橫◎', 'spec': '', 'price': 1080, 'isSpecial': true, 'type': 'h'}, {'name': '錏管5分直◎', 'spec': '', 'price': 1180, 'isSpecial': true, 'type': 'v'}, {'name': '鋼管5分橫', 'spec': '', 'price': 1380, 'type': 'h'}, {'name': '鋼管5分直', 'spec': '', 'price': 1480, 'type': 'v'}, {'name': '6分橫', 'spec': '', 'price': 1780, 'type': 'h'}, {'name': '6分直', 'spec': '', 'price': 1900, 'type': 'v'}, {'name': '7分橫', 'spec': '', 'price': 2300, 'type': 'h'}, {'name': '7分直', 'spec': '', 'price': 2500, 'type': 'v'}, {'name': '8分橫', 'spec': '', 'price': 3400, 'type': 'h'}, {'name': '8分直', 'spec': '', 'price': 3580, 'type': 'v'}, {'name': '10分橫', 'spec': '', 'price': 4800, 'type': 'h'}, {'name': '10分直', 'spec': '', 'price': 4960, 'type': 'v'}, {'name': '11分橫', 'spec': '', 'price': 7500, 'type': 'h'}, {'name': '11分直', 'spec': '', 'price': 7650, 'type': 'v'}];
let activeIdx = 0, isDealerMode = false, isOnlySelected = false;

function showInfo() { 
    const modal = document.getElementById('info-modal');
    modal.querySelector('.info-card').innerHTML = `
        <h3 style="margin-top:0;">軟體資訊</h3>
        <p style="font-size:18px; font-weight:800;">產生時間：2026.04.04 19:37</p>
        <p style="font-size:18px; font-weight:800;">目前價格日期：2025.02.10</p>
        <p style="font-size:14px; color:#666; margin-top:20px;">點擊任意處關閉</p>
    `;
    modal.style.display = 'flex'; 
}
function hideInfo() { document.getElementById('info-modal').style.display = 'none'; }

function saveData() {
    const data = products.map((_, i) => document.getElementById('q-' + i).innerText);
    localStorage.setItem('fushan_quantities', JSON.stringify(data));
}

function loadData() {
    const saved = localStorage.getItem('fushan_quantities');
    if (saved) {
        const data = JSON.parse(saved);
        data.forEach((val, i) => { if (document.getElementById('q-' + i)) document.getElementById('q-' + i).innerText = val; });
        calculate();
    }
}

function init() {
    const b = document.getElementById('p-list');
    products.forEach((p, i) => {
        const tr = document.createElement('tr');
        tr.id = 'r-'+i; tr.className = p.type === 'h' ? 'row-h' : 'row-v';
        tr.innerHTML = `<td><div class="prod-info ${p.isSpecial?'special-item':''}">${p.name}</div><div class="spec-info">${p.spec}</div></td>
                         <td style="color:#d35400; font-weight:900; font-size:1.5em; text-align:center;">${p.price}</td>
                         <td><div class="qty-box" id="q-${i}" onclick="event.stopPropagation();setA(${i})"></div></td>
                         <td class="subtotal" id="s-${i}">0</td>`;
        b.appendChild(tr);
    });
    setA(0);
    loadData();
}

function setA(i) {
    document.querySelectorAll('.qty-box').forEach(x => x.classList.remove('active'));
    activeIdx = i; document.getElementById('q-'+i).classList.add('active');
    toggleKeyboard(true);
    const row = document.getElementById('r-'+i);
    document.getElementById('scrollContainer').scrollTo({top: row.offsetTop-120, behavior:'smooth'});
}

function toggleKeyboard(s) { document.getElementById('panel').classList.toggle('collapsed', !s); }

function press(k) {
    const target = document.getElementById('q-'+activeIdx);
    if(typeof k==='number') target.innerText += k;
    else if(k==='del') target.innerText = target.innerText.slice(0,-1);
    else if(k==='next' && activeIdx < products.length-1) setA(activeIdx+1);
    calculate();
    saveData();
}

function calculate() {
    let total = 0;
    products.forEach((p,i) => {
        const qty = parseInt(document.getElementById('q-'+i).innerText)||0;
        const sub = qty * p.price; document.getElementById('s-'+i).innerText = sub.toLocaleString(); total += sub;
        const row = document.getElementById('r-'+i);
        if (isOnlySelected && qty === 0) row.classList.add('filtered-out');
        else row.classList.remove('filtered-out');
    });
    document.getElementById('total-orig').innerText = total.toLocaleString();
    if(isDealerMode) {
        document.getElementById('dealer-row').style.display = 'flex';
        document.getElementById('total-deal').innerText = Math.round(total * 0.9).toLocaleString();
    } else { document.getElementById('dealer-row').style.display = 'none'; }
}

function setPriceMode(m) { isDealerMode = m; document.getElementById('btnNorm').classList.toggle('active', !m); document.getElementById('btnDeal').classList.toggle('active', m); calculate(); }
function setFilter(f) { isOnlySelected = f; document.getElementById('btnAll').classList.toggle('active', !f); document.getElementById('btnSel').classList.toggle('active', f); calculate(); }

function resetAll() { 
    if(confirm('清空所有數量？')) { 
        products.forEach((_,i)=>document.getElementById('q-'+i).innerText=''); 
        localStorage.removeItem('fushan_quantities');
        calculate(); setA(0); 
    } 
}

async function output() {
    toggleKeyboard(false);
    const b = document.getElementById('c-list'); b.innerHTML = '';
    let total = 0, has = false;
    products.forEach((p,i) => {
        const qty = parseInt(document.getElementById('q-'+i).innerText)||0;
        if(qty > 0) { 
            has = true; const sub = qty * p.price; total += sub; 
            b.innerHTML += `<tr><td style="text-align:left;">${p.name} ${p.spec}</td><td style="text-align:right;">${qty}</td><td style="text-align:right;">${p.price}</td><td style="text-align:right;">${sub.toLocaleString()}</td></tr>`; 
        }
    });
    if(!has) return alert('請先輸入數量');
    const sumArea = document.getElementById('c-summary');
    if(isDealerMode) {
        sumArea.innerHTML = `<div class="sum-line">原價總計: ${total.toLocaleString()}</div><div class="sum-final">經銷結帳: ${Math.round(total * 0.9).toLocaleString()}</div>`;
    } else { sumArea.innerHTML = `<div class="sum-final">應付總計: ${total.toLocaleString()}</div>`; }
    const canvas = await html2canvas(document.getElementById('capture-area'), {scale:3});
    document.getElementById('res-img').src = canvas.toDataURL('image/png');
    document.getElementById('result-modal').style.display = 'flex';
}
function saveImg() { const a = document.createElement('a'); a.href = document.getElementById('res-img').src; a.download = '福山訂單.png'; a.click(); }
async function shareImgToLine() {
    const blob = await (await fetch(document.getElementById('res-img').src)).blob();
    const file = new File([blob], '訂單.png', {type:'image/png'});
    if(navigator.share) { navigator.share({files:[file], title:'福山押仔訂單'}); }
    else { alert("您的設備不支援直接分享圖片，請先點擊『儲存圖片』後再手動傳送至 LINE。"); }
}
function closeModal() { document.getElementById('result-modal').style.display = 'none'; }
window.onload = init;
</script></body></html>
